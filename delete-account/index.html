    <h1>Delete Your ApnaFlow Account</h1>

    <p>To delete your ApnaFlow account:</p>

    <ol>
        <li>Open the ApnaFlow app.</li>
        <li>Go to Settings → Account.</li>
        <li>Tap Delete Account.</li>
        <li>Confirm the deletion.</li>
    </ol>

    <p>If you cannot access the app, contact us at:</p>

    <p>mechatronicsinindia@gmail.com</p>
